# Docker Compose file for slackai-databot
version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: slackai
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./scripts/seed_db.sql:/docker-entrypoint-initdb.d/seed_db.sql
  app:
    build: ./app
    environment:
      - ENV_FILE=.env
    depends_on:
      - db
    volumes:
      - ./app:/app
    ports:
      - "8000:8000"
volumes:
  db_data:
